<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan Pekerjaan Lapangan RIMPANG DIGITAL KREATIF</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Library untuk save file (FileSaver) dan export JPG (html2canvas) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        @media print {
            .no-print { display: none !important; }
            .print-break-inside-avoid { page-break-inside: avoid; }
            .print-mt-4 { margin-top: 1rem !important; }
            body { background-color: white !important; }
            input, textarea, select {
                border: none !important;
                background: transparent !important;
                resize: none !important;
                padding: 0 !important;
                box-shadow: none !important;
                overflow: hidden !important;
            }
            .img-preview { max-width: 300px !important; max-height: 200px !important; }
        }

        /* Styling khusus saat proses export JPG agar terlihat seperti hasil print */
        .export-mode .no-print { display: none !important; }
        .export-mode input, .export-mode textarea, .export-mode select {
            border: none !important;
            background: transparent !important;
            resize: none !important;
            padding: 0 !important;
            box-shadow: none !important;
            overflow: hidden !important;
        }
        .export-mode .editable-text {
            border: none !important;
            background: transparent !important;
            box-shadow: none !important;
        }
        .export-mode {
            background-color: white !important;
        }
        .export-mode-container {
            background-color: white !important;
            padding: 20px !important;
        }

        .editable-text:empty:before {
            content: attr(data-placeholder);
            color: #94a3b8;
            pointer-events: none;
            display: block; 
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen">
    <div id="main-report-container" class="max-w-5xl mx-auto p-4 md:p-8 transition-colors">
        <div class="bg-white rounded-xl shadow-lg p-6 md:p-10 border-t-4 border-amber-500 mb-8 export-block">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center border-b border-slate-200 pb-6 mb-6">
                <div>
                    <h1 class="text-2xl md:text-3xl font-bold text-slate-800 tracking-tight">LAPORAN PEKERJAAN LAPANGAN</h1>
                    <h2 class="text-lg md:text-xl font-semibold text-amber-600 mt-1">RIMPANG DIGITAL KREATIF</h2>
                </div>
                
                <div class="mt-4 md:mt-0 flex flex-wrap gap-2 md:gap-3 no-print">
                    <button id="btn-word" onclick="exportToWord()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition shadow-sm flex items-center gap-2">
                        <i class="fas fa-file-word"></i> Ekspor Word (.doc)
                    </button>
                    <button id="btn-jpg" onclick="exportToJPG()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition shadow-sm flex items-center gap-2">
                        <i class="fas fa-image"></i> Ekspor JPG (HD)
                    </button>
                    <button onclick="window.print()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition shadow-sm flex items-center gap-2">
                        <i class="fas fa-print"></i> Cetak PDF / Print
                    </button>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1 uppercase">Nama Event / Pameran</label>
                    <input type="text" id="infoEvent" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500 focus:border-transparent transition" placeholder="Masukkan Nama Event" onchange="saveData()">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1 uppercase">Lokasi (Venue)</label>
                    <input type="text" id="infoVenue" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500 focus:border-transparent transition" placeholder="Masukkan Lokasi" onchange="saveData()">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1 uppercase">Tanggal Pelaksanaan</label>
                    <input type="date" id="infoDate" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500 focus:border-transparent transition" onchange="saveData()">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1 uppercase">Nama Vendor</label>
                    <input type="text" id="infoVendor" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500 focus:border-transparent transition" placeholder="Masukkan Nama Vendor" onchange="saveData()">
                </div>
            </div>
        </div>

        <div id="checklist-container" class="space-y-6">
            <!-- Data Kategori akan dirender di sini via JS -->
        </div>

        <div class="mt-8 flex justify-center no-print">
            <button onclick="addCategory()" class="bg-amber-100 hover:bg-amber-200 text-amber-800 px-6 py-3 rounded-full text-sm font-bold transition shadow-sm flex items-center gap-2 border border-amber-300">
                <i class="fas fa-plus-circle"></i> Tambah Kategori Baru
            </button>
        </div>

        <div class="mt-16 pt-8 border-t-2 border-slate-200 print-break-inside-avoid export-block pb-8">
            <div class="grid grid-cols-2 gap-8 text-center">
                <div>
                    <p class="text-sm font-semibold text-slate-600 mb-24">PIC Vendor</p>
                    <div class="border-b border-slate-400 w-3/4 mx-auto mb-2"></div>
                    <input type="text" id="infoPicVendor" class="text-sm text-center bg-transparent focus:outline-none w-full font-medium" placeholder="Nama Terang & Tanda Tangan" onchange="saveData()">
                </div>
                <div>
                    <p class="text-sm font-semibold text-slate-600 mb-24">Supervisor / PIC Rimpang</p>
                    <div class="border-b border-slate-400 w-3/4 mx-auto mb-2"></div>
                    <input type="text" id="infoPicRimpang" class="text-sm text-center bg-transparent focus:outline-none w-full font-medium" placeholder="Nama Terang & Tanda Tangan" onchange="saveData()">
                </div>
            </div>
        </div>
    </div>

    <div id="imageModal" class="fixed inset-0 z-50 bg-slate-900/95 hidden flex-col items-center justify-center p-4 transition-opacity no-print backdrop-blur-sm">
        <button onclick="closeModal()" class="absolute top-6 right-6 text-slate-300 hover:text-white text-4xl focus:outline-none z-50 transition drop-shadow-md">
            <i class="fas fa-times"></i>
        </button>
        <div class="absolute top-6 left-6 flex gap-4 z-50">
            <button onclick="zoomImage(0.25)" class="bg-white/10 hover:bg-white/20 text-white p-3 rounded-full backdrop-blur-md transition border border-white/20 shadow-lg" title="Zoom In">
                <i class="fas fa-search-plus"></i>
            </button>
            <button onclick="zoomImage(-0.25)" class="bg-white/10 hover:bg-white/20 text-white p-3 rounded-full backdrop-blur-md transition border border-white/20 shadow-lg" title="Zoom Out">
                <i class="fas fa-search-minus"></i>
            </button>
            <button onclick="resetZoom()" class="bg-white/10 hover:bg-white/20 text-white p-3 rounded-full backdrop-blur-md transition border border-white/20 shadow-lg" title="Reset Zoom">
                <i class="fas fa-expand"></i>
            </button>
        </div>
        <div class="w-full h-full flex items-center justify-center overflow-auto" id="modalImageContainer">
            <img id="modalImage" src="" class="max-w-[90%] max-h-[90%] object-contain transition-transform duration-200 origin-center rounded-lg shadow-2xl" style="transform: scale(1);">
        </div>
    </div>

    <script>
        let checklistData = [];
        let currentScale = 1;

        function initDefaultData() {
            return [
                {
                    id: generateId(),
                    title: 'Persiapan & Area Booth',
                    items: [
                        { id: generateId(), name: 'Struktur booth berdiri kokoh dan aman', remarks: ['', '', ''], photo: '' },
                        { id: generateId(), name: 'Kebersihan area lantai dan dinding', remarks: ['', '', ''], photo: '' }
                    ]
                },
                {
                    id: generateId(),
                    title: 'Sistem Kelistrikan & Pencahayaan',
                    items: [
                        { id: generateId(), name: 'Semua lampu menyala sesuai layout', remarks: ['', '', ''], photo: '' },
                        { id: generateId(), name: 'Stop kontak berfungsi dan aman', remarks: ['', '', ''], photo: '' }
                    ]
                }
            ];
        }

        function generateId() {
            return Math.random().toString(36).substr(2, 9);
        }

        function loadData() {
            try {
                const savedData = localStorage.getItem('rimpang_data_v3');
                if (savedData) {
                    const parsed = JSON.parse(savedData);
                    checklistData = parsed.checklist || initDefaultData();
                    document.getElementById('infoEvent').value = parsed.infoEvent || '';
                    document.getElementById('infoVenue').value = parsed.infoVenue || '';
                    document.getElementById('infoDate').value = parsed.infoDate || '';
                    document.getElementById('infoVendor').value = parsed.infoVendor || '';
                    document.getElementById('infoPicVendor').value = parsed.infoPicVendor || '';
                    document.getElementById('infoPicRimpang').value = parsed.infoPicRimpang || '';
                } else {
                    checklistData = initDefaultData();
                }
            } catch (e) {
                console.error('Error loading data', e);
                checklistData = initDefaultData();
            }
            
            if(!document.getElementById('infoDate').value) {
                document.getElementById('infoDate').valueAsDate = new Date();
            }
            renderApp();
        }

        function saveData() {
            updateStateFromDOM();
            const dataToSave = {
                infoEvent: document.getElementById('infoEvent').value,
                infoVenue: document.getElementById('infoVenue').value,
                infoDate: document.getElementById('infoDate').value,
                infoVendor: document.getElementById('infoVendor').value,
                infoPicVendor: document.getElementById('infoPicVendor').value,
                infoPicRimpang: document.getElementById('infoPicRimpang').value,
                checklist: checklistData
            };
            try {
                localStorage.setItem('rimpang_data_v3', JSON.stringify(dataToSave));
            } catch (e) {
                console.warn("Penyimpanan cache penuh.");
            }
        }

        function updateStateFromDOM() {
            checklistData.forEach(cat => {
                const catTitleEl = document.getElementById(`cat-title-${cat.id}`);
                if (catTitleEl) cat.title = catTitleEl.innerText;

                cat.items.forEach(item => {
                    const itemNameEl = document.getElementById(`item-name-${item.id}`);
                    if (itemNameEl) item.name = itemNameEl.innerText;

                    for (let i = 0; i < 3; i++) {
                        const remarkEl = document.getElementById(`item-remark-${item.id}-${i}`);
                        if (remarkEl) item.remarks[i] = remarkEl.value;
                    }
                });
            });
        }

        function renderApp() {
            const container = document.getElementById('checklist-container');
            container.innerHTML = '';

            checklistData.forEach((category) => {
                const catDiv = document.createElement('div');
                catDiv.className = 'bg-white rounded-xl shadow-md overflow-hidden border border-slate-200 print-break-inside-avoid print-mt-4 mb-6 export-block';
                
                let itemsHtml = '';
                category.items.forEach((item) => {
                    itemsHtml += `
                        <div class="p-4 md:p-5 hover:bg-slate-50 transition border-b border-slate-100 last:border-0 relative group">
                            <button onclick="deleteItem('${category.id}', '${item.id}')" class="absolute top-4 right-4 text-red-300 hover:text-red-500 transition no-print opacity-0 group-hover:opacity-100" title="Hapus Item">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                            
                            <div class="flex gap-3 mb-4">
                                <div class="mt-1">
                                    <div class="w-5 h-5 rounded border-2 border-slate-300 flex items-center justify-center bg-white shadow-sm">
                                        <i class="fas fa-check text-slate-300 text-xs"></i>
                                    </div>
                                </div>
                                <div class="flex-1">
                                    <div class="font-semibold text-slate-800 editable-text outline-none focus:bg-amber-50 focus:ring-2 focus:ring-amber-200 rounded px-1 transition text-base" contenteditable="true" id="item-name-${item.id}" onblur="saveData()" data-placeholder="Ketik detail pekerjaan...">${item.name}</div>
                                </div>
                            </div>

                            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 pl-8">
                                <div class="md:col-span-3 space-y-3">
                                    <div>
                                        <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase tracking-wider">Sub Keterangan 1</label>
                                        <textarea id="item-remark-${item.id}-0" class="w-full text-sm border border-slate-200 rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-amber-500 focus:border-transparent transition bg-slate-50/50" rows="1" placeholder="Catatan detail 1..." onchange="saveData()">${item.remarks[0] || ''}</textarea>
                                    </div>
                                    <div>
                                        <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase tracking-wider">Sub Keterangan 2</label>
                                        <textarea id="item-remark-${item.id}-1" class="w-full text-sm border border-slate-200 rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-amber-500 focus:border-transparent transition bg-slate-50/50" rows="1" placeholder="Catatan detail 2..." onchange="saveData()">${item.remarks[1] || ''}</textarea>
                                    </div>
                                    <div>
                                        <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase tracking-wider">Sub Keterangan 3</label>
                                        <textarea id="item-remark-${item.id}-2" class="w-full text-sm border border-slate-200 rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-amber-500 focus:border-transparent transition bg-slate-50/50" rows="1" placeholder="Catatan detail 3..." onchange="saveData()">${item.remarks[2] || ''}</textarea>
                                    </div>
                                </div>

                                <div class="md:col-span-1">
                                    <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase tracking-wider"><i class="fas fa-camera mr-1"></i> Foto</label>
                                    <input type="file" accept="image/*" class="w-full text-xs text-slate-500 file:mr-2 file:py-1.5 file:px-3 file:rounded-lg file:border-0 file:text-xs file:font-semibold file:bg-amber-50 file:text-amber-700 hover:file:bg-amber-100 transition cursor-pointer no-print mb-2 border border-slate-200 rounded-lg p-1" onchange="handleImage(event, '${category.id}', '${item.id}')">
                                    <img id="img-${item.id}" src="${item.photo}" class="${item.photo ? 'block' : 'hidden'} w-full h-32 object-cover print:h-auto print:max-h-[250px] print:object-contain rounded-lg border border-slate-200 shadow-sm cursor-zoom-in hover:opacity-90 transition-opacity" alt="Bukti Foto" onclick="openModal(this.src)">
                                </div>
                            </div>
                        </div>
                    `;
                });

                catDiv.innerHTML = `
                    <div class="bg-slate-100 px-5 py-3 border-b border-slate-200 flex justify-between items-center group">
                        <h3 class="font-bold text-slate-700 text-lg uppercase tracking-wide flex items-center gap-2 w-full">
                            <i class="fas fa-clipboard-list text-amber-500"></i>
                            <span class="editable-text outline-none focus:bg-white focus:ring-2 focus:ring-amber-300 rounded px-2 py-1 w-full" contenteditable="true" id="cat-title-${category.id}" onblur="saveData()" data-placeholder="Nama Kategori...">${category.title}</span>
                        </h3>
                        <button onclick="deleteCategory('${category.id}')" class="text-slate-400 hover:text-red-600 transition ml-2 no-print opacity-0 group-hover:opacity-100" title="Hapus Kategori">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                    <div class="divide-y divide-slate-100">
                        ${itemsHtml}
                    </div>
                    <div class="bg-slate-50 px-5 py-3 border-t border-slate-100 no-print">
                        <button onclick="addItem('${category.id}')" class="text-sm font-semibold text-amber-600 hover:text-amber-700 transition flex items-center gap-2">
                            <i class="fas fa-plus"></i> Tambah Pekerjaan / Point Baru
                        </button>
                    </div>
                `;
                container.appendChild(catDiv);
            });

            // Resizing auto untuk textarea
            document.querySelectorAll('textarea').forEach(el => {
                el.addEventListener('input', function() { resizeTextarea(this); });
                if(el.value) resizeTextarea(el);
            });
        }

        function resizeTextarea(el) {
            el.style.height = 'auto';
            el.style.height = (el.scrollHeight) + 'px';
        }

        function resizeAllTextareas() {
            document.querySelectorAll('textarea').forEach(el => resizeTextarea(el));
        }

        function addCategory() {
            updateStateFromDOM();
            checklistData.push({
                id: generateId(),
                title: 'Kategori Baru',
                items: [
                    { id: generateId(), name: 'Pekerjaan baru', remarks: ['', '', ''], photo: '' }
                ]
            });
            renderApp();
            saveData();
        }

        function deleteCategory(catId) {
            if(!confirm("Yakin ingin menghapus kategori ini beserta isinya?")) return;
            updateStateFromDOM();
            checklistData = checklistData.filter(c => c.id !== catId);
            renderApp();
            saveData();
        }

        function addItem(catId) {
            updateStateFromDOM();
            const cat = checklistData.find(c => c.id === catId);
            if (cat) {
                cat.items.push({ id: generateId(), name: 'Detail Pekerjaan', remarks: ['', '', ''], photo: '' });
                renderApp();
                saveData();
            }
        }

        function deleteItem(catId, itemId) {
            if(!confirm("Yakin ingin menghapus point ini?")) return;
            updateStateFromDOM();
            const cat = checklistData.find(c => c.id === catId);
            if (cat) {
                cat.items = cat.items.filter(i => i.id !== itemId);
                renderApp();
                saveData();
            }
        }

        function handleImage(event, catId, itemId) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 800; // Kompresi untuk efisiensi render
                    let width = img.width;
                    let height = img.height;
                    
                    if (width > MAX_WIDTH) {
                        height = Math.round((height * MAX_WIDTH) / width);
                        width = MAX_WIDTH;
                    }
                    
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    const compressedBase64 = canvas.toDataURL('image/jpeg', 0.8);
                    
                    updateStateFromDOM();
                    const cat = checklistData.find(c => c.id === catId);
                    if(cat) {
                        const item = cat.items.find(i => i.id === itemId);
                        if(item) {
                            item.photo = compressedBase64;
                            renderApp();
                            saveData();
                        }
                    }
                }
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function openModal(imgSrc) {
            if(!imgSrc || imgSrc === window.location.href) return;
            const modal = document.getElementById('imageModal');
            const modalImg = document.getElementById('modalImage');
            
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            modalImg.src = imgSrc;
            resetZoom();
            document.body.style.overflow = 'hidden'; 
        }

        function closeModal() {
            const modal = document.getElementById('imageModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            document.body.style.overflow = 'auto'; 
        }

        function zoomImage(step) {
            currentScale += step;
            if (currentScale < 0.2) currentScale = 0.2;
            if (currentScale > 5) currentScale = 5;
            document.getElementById('modalImage').style.transform = `scale(${currentScale})`;
        }

        function resetZoom() {
            currentScale = 1;
            document.getElementById('modalImage').style.transform = `scale(${currentScale})`;
        }

        function exportToWord() {
            updateStateFromDOM();
            
            const btn = document.getElementById('btn-word');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Memproses Word...';
            btn.disabled = true;

            setTimeout(() => {
                try {
                    const eventName = document.getElementById('infoEvent').value || '-';
                    const venueName = document.getElementById('infoVenue').value || '-';
                    const dateVal = document.getElementById('infoDate').value || '-';
                    const vendorName = document.getElementById('infoVendor').value || '-';
                    const picVendor = document.getElementById('infoPicVendor').value || '(________________________)';
                    const picRimpang = document.getElementById('infoPicRimpang').value || '(________________________)';

                    // Membuat Struktur HTML Khusus Dokumen MS Word
                    let htmlContent = `
                        <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
                        <head>
                            <meta charset='utf-8'>
                            <title>Laporan Pekerjaan Lapangan</title>
                            <style>
                                body { font-family: Arial, sans-serif; font-size: 11pt; color: #333; }
                                .text-center { text-align: center; }
                                .title { font-size: 16pt; font-weight: bold; margin-bottom: 0px; }
                                .subtitle { font-size: 12pt; color: #d97706; margin-top: 5px; font-weight: bold; }
                                table { border-collapse: collapse; width: 100%; margin-bottom: 20px; }
                                th, td { border: 1px solid #94a3b8; padding: 8px; vertical-align: top; }
                                th { background-color: #f1f5f9; font-weight: bold; text-align: left; }
                                .info-table td { border: none; padding: 4px; }
                                .cat-title { background-color: #e2e8f0; font-weight: bold; font-size: 12pt; padding: 10px; margin-top:20px; }
                                .img-preview { max-width: 200px; max-height: 150px; border-radius: 4px; border: 1px solid #ccc; }
                                .signature-table { border: none; width: 100%; margin-top: 50px; }
                                .signature-table td { border: none; text-align: center; width: 50%; vertical-align: bottom; height: 120px; }
                            </style>
                        </head>
                        <body>
                            <div class="text-center">
                                <p class="title">LAPORAN PEKERJAAN LAPANGAN</p>
                                <p class="subtitle">RIMPANG DIGITAL KREATIF</p>
                            </div>
                            <hr style="margin-bottom: 20px;">
                            
                            <table class="info-table">
                                <tr>
                                    <td width="30%"><strong>Nama Event / Pameran</strong></td>
                                    <td width="70%">: ${eventName}</td>
                                </tr>
                                <tr>
                                    <td><strong>Lokasi (Venue)</strong></td>
                                    <td>: ${venueName}</td>
                                </tr>
                                <tr>
                                    <td><strong>Tanggal Pelaksanaan</strong></td>
                                    <td>: ${dateVal}</td>
                                </tr>
                                <tr>
                                    <td><strong>Nama Vendor</strong></td>
                                    <td>: ${vendorName}</td>
                                </tr>
                            </table>
                    `;

                    checklistData.forEach(cat => {
                        htmlContent += `<div class="cat-title">${cat.title}</div>`;
                        htmlContent += `
                            <table>
                                <tr>
                                    <th width="20%">Pekerjaan</th>
                                    <th width="20%">Keterangan 1</th>
                                    <th width="20%">Keterangan 2</th>
                                    <th width="20%">Keterangan 3</th>
                                    <th width="20%">Foto</th>
                                </tr>
                        `;
                        cat.items.forEach(item => {
                            let imgTag = item.photo ? `<img src="${item.photo}" class="img-preview"/>` : '-';
                            htmlContent += `
                                <tr>
                                    <td>${item.name}</td>
                                    <td>${item.remarks[0] || ''}</td>
                                    <td>${item.remarks[1] || ''}</td>
                                    <td>${item.remarks[2] || ''}</td>
                                    <td class="text-center">${imgTag}</td>
                                </tr>
                            `;
                        });
                        htmlContent += `</table>`;
                    });

                    htmlContent += `
                            <table class="signature-table">
                                <tr>
                                    <td>
                                        <p style="margin-bottom: 80px;"><b>PIC Vendor</b></p>
                                        <p>${picVendor}</p>
                                    </td>
                                    <td>
                                        <p style="margin-bottom: 80px;"><b>Supervisor / PIC Rimpang</b></p>
                                        <p>${picRimpang}</p>
                                    </td>
                                </tr>
                            </table>
                        </body>
                        </html>
                    `;

                    // Konversi ke Doc
                    const blob = new Blob(['\ufeff', htmlContent], {
                        type: 'application/msword'
                    });
                    
                    const safeName = eventName.replace(/[^a-z0-9]/gi, '_').toLowerCase();
                    const finalFileName = `Laporan_RIMPANG_${safeName}_${dateVal}.doc`;
                    
                    saveAs(blob, finalFileName);

                } catch (error) {
                    console.error(error);
                    alert("Terjadi kesalahan saat mengekspor Word.");
                } finally {
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }
            }, 100);
        }

        async function exportToJPG() {
            updateStateFromDOM();
            
            const btn = document.getElementById('btn-jpg');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Merender JPG...';
            btn.disabled = true;

            // Memastikan textarea tidak memiliki scroll sebelum render
            resizeAllTextareas();

            // Aktifkan mode ekspor untuk sembunyikan UI input/tombol
            document.body.classList.add('export-mode');
            const reportContainer = document.getElementById('main-report-container');
            reportContainer.classList.add('export-mode-container');

            try {
                // Konfigurasi html2canvas - Scale 3 agar beresolusi tinggi (HD)
                const canvas = await html2canvas(reportContainer, {
                    scale: 3, 
                    useCORS: true,
                    backgroundColor: '#ffffff',
                    windowWidth: document.documentElement.offsetWidth,
                    windowHeight: document.documentElement.offsetHeight,
                });

                const eventName = document.getElementById('infoEvent').value || 'Pekerjaan';
                const dateVal = document.getElementById('infoDate').value || 'Tanggal';
                const safeName = eventName.replace(/[^a-z0-9]/gi, '_').toLowerCase();
                const finalFileName = `Laporan_RIMPANG_${safeName}_${dateVal}.jpg`;

                // Convert Canvas ke Blob (JPEG Kualitas 95%)
                canvas.toBlob(function(blob) {
                    saveAs(blob, finalFileName);
                }, 'image/jpeg', 0.95);

            } catch (error) {
                console.error("Gagal export JPG:", error);
                alert("Terjadi kesalahan saat merender JPG. Coba perkecil ukuran window.");
            } finally {
                // Matikan mode ekspor, kembalikan UI normal
                document.body.classList.remove('export-mode');
                reportContainer.classList.remove('export-mode-container');
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        // Jalankan inisiasi saat halaman dibuka
        window.onload = loadData;
    </script>
</body>
</html>
